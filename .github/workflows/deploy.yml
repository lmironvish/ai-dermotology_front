name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ANALYSIS_API_MODE: ${{ vars.VITE_ANALYSIS_API_MODE }}
          VITE_ANALYSIS_API_BACKEND: ${{ vars.VITE_ANALYSIS_API_BACKEND }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_ANALYSIS_POLL_INTERVAL_MS: ${{ vars.VITE_ANALYSIS_POLL_INTERVAL_MS }}
          VITE_ANALYSIS_POLL_TIMEOUT_MS: ${{ vars.VITE_ANALYSIS_POLL_TIMEOUT_MS }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4